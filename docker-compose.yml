services:
  lazy-tool-service:
    image: lazy-tool-service:latest
    container_name: lazy-tool-service
    restart: unless-stopped
    ports:
      - "5591:5591"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - API_SERVER_KEY=sun-trading-secure-api-key-2026
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
      - ./data/charts:/app/data/charts

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:5591/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
